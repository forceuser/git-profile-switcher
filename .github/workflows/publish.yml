name: Publish package

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        run: npm run release:check-tag -- "$GITHUB_REF_NAME"

      - name: Verify package
        run: npm run verify:publish

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p 'JSON.parse(require("fs").readFileSync("package.json", "utf8")).name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'JSON.parse(require("fs").readFileSync("package.json", "utf8")).version')" >> "$GITHUB_OUTPUT"

      - name: Check published version
        id: published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.published.outputs.exists != 'true'
        run: npm publish --access public
